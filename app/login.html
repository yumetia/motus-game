<!DOCTYPE html>
<html lang="fr" data-theme="dracula">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.svg">
    <title>Motus — Connexion</title>
    <script src="../js/theme.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<div class="theme-toggle">
    <button class="btn-theme" id="themeToggle" onclick="cycleTheme()">dracula</button>
</div>

<div class="card-motus">

    <div class="motus-logo">
        <div class="letter-box red">M</div>
        <div class="letter-box yellow">O</div>
        <div class="letter-box red">T</div>
        <div class="letter-box">U</div>
        <div class="letter-box">S</div>
    </div>

    <h1 class="auth-title">Connexion</h1>
    <p class="auth-subtitle">Retrouvez votre partie et vos scores.</p>

    <div class="alert-box alert-error" id="errorMsg"></div>

    <div class="form-group">
        <div class="field">
            <label class="label-motus">Email</label>
            <input type="email" id="email" class="input-motus" placeholder="vous@email.com">
        </div>
        <div class="field">
            <label class="label-motus">Mot de passe</label>
            <input type="password" id="password" class="input-motus" placeholder="••••••••">
        </div>
        <button class="btn-motus" id="loginBtn" onclick="handleLogin()">Se connecter</button>
    </div>

    <hr class="auth-divider">

    <p class="auth-footer">
        Pas encore de compte ? <a href="register">S'inscrire</a>
    </p>
</div>

<script>
    const API_URL = "http://localhost:8888";

    async function handleLogin() {
        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn      = document.getElementById("loginBtn");

        hideError();

        if (!email || !password) { showError("Veuillez remplir tous les champs."); return; }

        btn.textContent = "Connexion...";
        btn.disabled    = true;

        try {
            const res  = await fetch(`${API_URL}/api/login`, {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (res.ok) {
                window.location.href = "/index";
            } else {
                showError(data.error || "Identifiants incorrects.");
            }
        } catch (e) {
            showError("Impossible de contacter le serveur.");
        } finally {
            btn.textContent = "Se connecter";
            btn.disabled    = false;
        }
    }

    function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.style.display = "block";
    }

    function hideError() {
        document.getElementById("errorMsg").style.display = "none";
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
</script>
</body>
</html>
