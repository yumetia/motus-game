<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motus — Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<div class="card-motus">
    <div class="flex items-center gap-1 mb-8">
        <div class="letter-box red">M</div>
        <div class="letter-box yellow">O</div>
        <div class="letter-box red">T</div>
        <div class="letter-box">U</div>
        <div class="letter-box">S</div>
    </div>

    <h1 class="title text-3xl text-white mb-1">Connexion</h1>
    <p class="text-sm mb-8" style="color:#555">Retrouvez votre partie et vos scores.</p>

    <div class="alert-box alert-error mb-4" id="errorMsg"></div>

    <div class="flex flex-col gap-5">
        <div>
            <label class="label-motus">Email</label>
            <input type="email" id="email" class="input-motus" placeholder="vous@email.com">
        </div>
        <div>
            <label class="label-motus">Mot de passe</label>
            <input type="password" id="password" class="input-motus" placeholder="••••••••">
        </div>
        <button class="btn-motus" id="loginBtn" onclick="handleLogin()">Se connecter</button>
    </div>

    <hr>

    <p class="text-center text-sm" style="color:#555">
        Pas encore de compte ?
        <a href="/register" style="color:var(--red)">S'inscrire</a>
    </p>
</div>

<script>
    const API_URL = "http://localhost:8888";

    async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");

        hideError();

        if (!email || !password) { showError("Veuillez remplir tous les champs."); return; }

        btn.textContent = "Connexion...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API_URL}/api/login`, {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (res.ok) {
                window.location.href = "/index";
            } else {
                showError(data.error || "Identifiants incorrects.");
            }
        } catch (e) {
            showError("Impossible de contacter le serveur.");
        } finally {
            btn.textContent = "Se connecter";
            btn.disabled = false;
        }
    }

    function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.style.display = "block";
    }

    function hideError() {
        document.getElementById("errorMsg").style.display = "none";
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
</script>
</body>
</html>
