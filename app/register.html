<!DOCTYPE html>
<html lang="fr" data-theme="dracula">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.svg">
    <title>Motus — Inscription</title>
    <script src="../js/theme.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<div class="theme-toggle">
    <button class="btn-theme" id="themeToggle" onclick="cycleTheme()">dracula</button>
</div>

<div class="card-motus">

    <div class="motus-logo">
        <div class="letter-box red">M</div>
        <div class="letter-box yellow">O</div>
        <div class="letter-box red">T</div>
        <div class="letter-box">U</div>
        <div class="letter-box">S</div>
    </div>

    <h1 class="auth-title">Inscription</h1>
    <p class="auth-subtitle">Créez votre compte pour jouer.</p>

    <div class="alert-box alert-error" id="errorMsg"></div>
    <div class="alert-box alert-success" id="successMsg"></div>

    <div class="form-group">
        <div class="field">
            <label class="label-motus">Pseudo</label>
            <input type="text" id="username" class="input-motus" placeholder="VotreNom">
        </div>
        <div class="field">
            <label class="label-motus">Email</label>
            <input type="email" id="email" class="input-motus" placeholder="vous@email.com">
        </div>
        <div class="field">
            <label class="label-motus">Mot de passe</label>
            <input type="password" id="password" class="input-motus" placeholder="••••••••">
            <p class="password-hint">Minimum 8 caractères</p>
        </div>
        <button class="btn-motus" id="registerBtn" onclick="handleRegister()">Créer mon compte</button>
    </div>

    <hr class="auth-divider">

    <p class="auth-footer">
        Déjà un compte ? <a href="login">Se connecter</a>
    </p>
</div>

<script>
    const API_URL = "http://localhost:8888";

    async function handleRegister() {
        const username = document.getElementById("username").value.trim();
        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn      = document.getElementById("registerBtn");

        hideMessages();

        if (!username || !email || !password) { showError("Veuillez remplir tous les champs."); return; }
        if (password.length < 8) { showError("Le mot de passe doit contenir au moins 8 caractères."); return; }

        btn.textContent = "Création...";
        btn.disabled    = true;

        try {
            const res  = await fetch(`${API_URL}/api/register`, {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();

            if (res.ok) {
                showSuccess("Compte créé ! Redirection...");
                setTimeout(() => window.location.href = "/html/game", 1500);
            } else {
                showError(data.error || "Une erreur est survenue.");
            }
        } catch (e) {
            showError("Impossible de contacter le serveur.");
        } finally {
            btn.textContent = "Créer mon compte";
            btn.disabled    = false;
        }
    }

    function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg; el.style.display = "block";
    }

    function showSuccess(msg) {
        const el = document.getElementById("successMsg");
        el.textContent = msg; el.style.display = "block";
    }

    function hideMessages() {
        document.getElementById("errorMsg").style.display = "none";
        document.getElementById("successMsg").style.display = "none";
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") handleRegister(); });
</script>
</body>
</html>
