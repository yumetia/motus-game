<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motus — Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<div class="card-motus">
    <div class="flex items-center gap-1 mb-8">
        <div class="letter-box red">M</div>
        <div class="letter-box yellow">O</div>
        <div class="letter-box red">T</div>
        <div class="letter-box">U</div>
        <div class="letter-box">S</div>
    </div>

    <h1 class="title text-3xl text-white mb-1">Inscription</h1>
    <p class="text-sm mb-8" style="color:#555">Créez votre compte pour jouer.</p>

    <div class="alert-box alert-error mb-4" id="errorMsg"></div>
    <div class="alert-box alert-success mb-4" id="successMsg"></div>

    <div class="flex flex-col gap-5">
        <div>
            <label class="label-motus">Pseudo</label>
            <input type="text" id="username" class="input-motus" placeholder="VotreNom">
        </div>
        <div>
            <label class="label-motus">Email</label>
            <input type="email" id="email" class="input-motus" placeholder="vous@email.com">
        </div>
        <div>
            <label class="label-motus">Mot de passe</label>
            <input type="password" id="password" class="input-motus" placeholder="••••••••">
            <p class="password-hint">Minimum 8 caractères</p>
        </div>
        <button class="btn-motus" id="registerBtn" onclick="handleRegister()">Créer mon compte</button>
    </div>

    <hr>

    <p class="text-center text-sm" style="color:#555">
        Déjà un compte ?
        <a href="/login" style="color:var(--red)">Se connecter</a>
    </p>
</div>

<script>
    const API_URL = "http://localhost:8888";

    async function handleRegister() {
        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("registerBtn");

        hideMessages();

        if (!username || !email || !password) {
            showError("Veuillez remplir tous les champs.");
            return;
        }

        if (password.length < 8) {
            showError("Le mot de passe doit contenir au moins 8 caractères.");
            return;
        }

        btn.textContent = "Création...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API_URL}/api/register`, {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();

            if (res.ok) {
                showSuccess("Compte créé ! Redirection...");
                setTimeout(() => window.location.href = "/login", 1500);
            } else {
                showError(data.error || "Une erreur est survenue.");
            }
        } catch (e) {
            showError("Impossible de contacter le serveur.");
        } finally {
            btn.textContent = "Créer mon compte";
            btn.disabled = false;
        }
    }

    function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.style.display = "block";
    }

    function showSuccess(msg) {
        const el = document.getElementById("successMsg");
        el.textContent = msg;
        el.style.display = "block";
    }

    function hideMessages() {
        document.getElementById("errorMsg").style.display = "none";
        document.getElementById("successMsg").style.display = "none";
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") handleRegister(); });
</script>
</body>
</html>
